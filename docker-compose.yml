services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: postgres_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5499:5432"

  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  worker:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      NODE_ENV: development
    depends_on:
      - postgres
      - redis
    command: sh -lc "corepack enable && pnpm install && pnpm run db:migrate && pnpm run worker"

volumes:
  redis_data:
